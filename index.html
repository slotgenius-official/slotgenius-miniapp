<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SlotGenius AI - Сигналы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --bg-color: #0a0a0f; 
            --card-bg: #151520; 
            --primary: #ffd700; 
            --accent: #9d00ff; 
            --success: #00ff88;
            --text: #ffffff; 
            --text-sec: #8b8b95;
            --gradient: linear-gradient(135deg, #9d00ff 0%, #ffd700 100%);
        }
        body { 
            background: var(--bg-color); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at top, rgba(157,0,255,0.15), transparent 50%),
                        radial-gradient(ellipse at bottom, rgba(255,215,0,0.1), transparent 50%);
        }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px 0 30px; }
        .header h1 { 
            font-size: 28px; 
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .header p { color: var(--text-sec); font-size: 14px; }
        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,215,0,0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 11px; color: var(--text-sec); margin-top: 4px; }
        .signal-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(157,0,255,0.3);
            box-shadow: 0 10px 40px rgba(157,0,255,0.2);
            display: none;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slot-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .slot-icon { font-size: 50px; }
        .slot-info h2 { color: var(--primary); font-size: 24px; margin-bottom: 5px; }
        .slot-badge {
            display: inline-block;
            background: var(--gradient);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .win-percentage { text-align: center; margin: 20px 0; }
        .win-percentage .number {
            font-size: 56px;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .win-percentage .label { color: var(--text-sec); font-size: 13px; margin-top: 8px; }
        .signal-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .detail-item { text-align: center; }
        .detail-item .value { font-size: 16px; font-weight: bold; color: var(--success); }
        .detail-item .label { font-size: 11px; color: var(--text-sec); margin-top: 4px; }
        .loader-container { text-align: center; padding: 40px 20px; display: none; }
        .loader {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(157,0,255,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: var(--text-sec); font-size: 14px; animation: pulse 1.5s ease infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .generate-btn {
            width: 100%;
            background: var(--gradient);
            border: none;
            border-radius: 16px;
            padding: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(157,0,255,0.4);
            transition: transform 0.2s;
            margin-top: 20px;
        }
        .generate-btn:active { transform: scale(0.98); }
        .footer { text-align: center; padding: 30px 20px; color: var(--text-sec); font-size: 12px; }
        .footer b { color: var(--success); }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <div class="header">
            <h1>🎰 SlotGenius AI</h1>
            <p>ИИ анализ игровых автоматов</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="todayWins">₽142,500</div>
                <div class="stat-label">Выигрышей сегодня</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracy">94.5%</div>
                <div class="stat-label">Точность сигналов</div>
            </div>
        </div>
        
        <div class="signal-card" id="signalCard">
            <div class="slot-header">
                <div class="slot-icon" id="slotIcon">🎰</div>
                <div class="slot-info">
                    <h2 id="slotName">Gates of Olympus</h2>
                    <span class="slot-badge">PREMIUM</span>
                </div>
            </div>
            <div class="win-percentage">
                <div class="number" id="winRate">98%</div>
                <div class="label">Вероятность выигрыша</div>
            </div>
            <div class="signal-details">
                <div class="detail-item">
                    <div class="value" id="bestTime">14:30</div>
                    <div class="label">Лучшее время</div>
                </div>
                <div class="detail-item">
                    <div class="value" id="betSize">50₽</div>
                    <div class="label">Ставка</div>
                </div>
                <div class="detail-item">
                    <div class="value" id="strategy">x2</div>
                    <div class="label">Стратегия</div>
                </div>
            </div>
        </div>
        
        <div class="loader-container" id="loader">
            <div class="loader"></div>
            <div class="loader-text" id="loaderText">Анализ данных...</div>
        </div>
        
        <button class="generate-btn" id="generateBtn" onclick="generateSignal()">🔮 Получить сигнал</button>
        
        <div class="footer">
            <p>Средний выигрыш: <b>₽3,450</b></p>
            <p style="margin-top: 8px; font-size: 11px;">Обновлено: только что</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#0a0a0f');
        tg.setBackgroundColor('#0a0a0f');

        const slots = [
            { name: "Gates of Olympus", icon: "⚡", provider: "Pragmatic" },
            { name: "Sweet Bonanza", icon: "🍭", provider: "Pragmatic" },
            { name: "The Dog House", icon: "🐶", provider: "Pragmatic" },
            { name: "Fruit Cocktail", icon: "🍒", provider: "Igrosoft" },
            { name: "Crazy Monkey", icon: "🐵", provider: "Igrosoft" },
            { name: "Aviator", icon: "✈️", provider: "Spribe" },
            { name: "Lucky Jet", icon: "🚀", provider: "1win" },
            { name: "Book of Dead", icon: "📖", provider: "Play'n GO" },
            { name: "Razor Shark", icon: "🦈", provider: "Push Gaming" }
        ];

        const loadingTexts = [
            "Подключение к серверу...",
            "Анализ последних 500 спинов...",
            "Вычисление волатильности...",
            "Определение фазы слота...",
            "Генерация прогноза ИИ...",
            "Проверка коэффициентов..."
        ];

        function generateSignal() {
            const btn = document.getElementById('generateBtn');
            const loader = document.getElementById('loader');
            const card = document.getElementById('signalCard');
            const loaderText = document.getElementById('loaderText');

            card.style.display = 'none';
            btn.style.display = 'none';
            loader.style.display = 'block';

            tg.HapticFeedback.impactOccurred('heavy');

            let step = 0;
            const interval = setInterval(() => {
                if (step < loadingTexts.length) {
                    loaderText.textContent = loadingTexts[step];
                    step++;
                }
            }, 400);

            setTimeout(() => {
                clearInterval(interval);
                showResult();
            }, 2500);
        }

        function showResult() {
            const loader = document.getElementById('loader');
            const card = document.getElementById('signalCard');
            const btn = document.getElementById('generateBtn');

            const slot = slots[Math.floor(Math.random() * slots.length)];
            const winRate = Math.floor(Math.random() * (99 - 87) + 87);
            const bet = [20, 30, 50, 100, 150, 200][Math.floor(Math.random() * 6)];
            const strategies = ['x2', 'x3', 'x5', 'Risk'];
            const strategy = strategies[Math.floor(Math.random() * strategies.length)];
            
            const now = new Date();
            now.setMinutes(now.getMinutes() + Math.floor(Math.random() * 10) + 1);
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                           now.getMinutes().toString().padStart(2, '0');

            document.getElementById('slotIcon').textContent = slot.icon;
            document.getElementById('slotName').textContent = slot.name;
            document.getElementById('winRate').textContent = winRate + '%';
            document.getElementById('bestTime').textContent = timeStr;
            document.getElementById('betSize').textContent = bet + '₽';
            document.getElementById('strategy').textContent = strategy;

            loader.style.display = 'none';
            card.style.display = 'block';
            btn.style.display = 'block';
            btn.textContent = '🔄 Новый сигнал';

            tg.HapticFeedback.notificationOccurred('success');

            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ffd700', '#9d00ff', '#00ff88']
            });

            tg.sendData(JSON.stringify({
                action: 'signal_generated',
                slot: slot.name,
                provider: slot.provider,
                winRate: winRate,
                bet: bet,
                strategy: strategy,
                time: timeStr,
                timestamp: new Date().toISOString()
            }));

            const wins = Math.floor(Math.random() * (200000 - 100000) + 100000);
            document.getElementById('todayWins').textContent = '₽' + wins.toLocaleString();
        }

        setInterval(() => {
            const accuracy = (94 + Math.random() * 2).toFixed(1);
            document.getElementById('accuracy').textContent = accuracy + '%';
        }, 10000);
    </script>
</body>
</html>
